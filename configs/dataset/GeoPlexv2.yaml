        "Pinus radiata",
        "Robinia pseudoacacia",
        "Pinus thunbergii",
        "Pinus echinata",
        "Thea sinensis",
        "Betula pendula",
        "Hevea brasiliensis",
        "Picea glehnii",
        "Quercus acutissima",
        "Eucalyptus nitens",
        "Cocos nucifera",
        "Anacardium occidentale",
        "Zelkova serrata",
        "Acer pictum",
        "Prunus serrulata",
